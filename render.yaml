services:
  - type: web
    name: gaycord
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_UPLOAD_BYTES
        value: 15728640
