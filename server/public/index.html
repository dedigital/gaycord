<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Gaycord - arkadaşlarınla mesajlaş, fotoğraf/dosya gönder, sesli mesaj bırak ve ses odalarına katıl.">
  <title>Gaycord</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/brand/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/brand/icon-192.png">
  <link rel="stylesheet" href="/styles.css?v=7.7.0">
  <link rel="stylesheet" href="/mobile.css?v=7.7.0">
</head>
<body>
  <main id="auth" class="auth-shell hidden">
    <section class="auth-card" aria-label="Gaycord giriş">
      <div class="auth-glow"></div>
      <div class="brand-block hero-brand">
        <img class="brand-logo" src="/brand/gaycord-logo.png" alt="Gaycord logosu">
        <div><p class="eyebrow">V7 Security</p><h1>Gaycord</h1><p>Sunucu kur, DM aç, fotoğraf/dosya gönder, sesli mesaj bırak ve ses odasına katıl.</p></div>
      </div>
      <div class="tabs" role="tablist" aria-label="Giriş seçenekleri">
        <button id="loginTab" class="tab active" type="button">Giriş</button>
        <button id="registerTab" class="tab" type="button">Kayıt</button>
      </div>
      <form id="authForm" class="stack">
        <label id="displayNameWrap" class="hidden">Görünen ad<input id="displayNameInput" autocomplete="name" placeholder="Örn. Ege"></label>
        <label>Kullanıcı adı<input id="usernameInput" autocomplete="username" required placeholder="ornek_kullanici"></label>
        <label>Şifre<input id="passwordInput" type="password" autocomplete="current-password" required placeholder="En az 6 karakter"></label>
        <button id="authSubmit" class="primary full" type="submit">Giriş yap</button>
      </form>
      <div id="publicDataStatus" class="auth-note hidden"></div>
      <div id="bootstrapRestoreWrap" class="auth-restore hidden">
        <button id="restoreLocalBackupButton" class="ghost full hidden" type="button">Tarayıcıdaki son yedeği geri yükle</button>
        <button id="restoreBackupFileButton" class="ghost full" type="button">Yedek dosyası yükle</button>
        <input id="bootstrapFileInput" class="hidden" type="file" accept="application/json,.json">
      </div>
    </section>
  </main>

  <main id="app" class="app hidden">
    <aside class="rail" aria-label="Sunucular">
      <div class="rail-logo" title="Gaycord"><img src="/brand/app-mark.png" alt=""></div>
      <button id="homeButton" class="rail-button active" type="button" title="Arkadaşlar">⌂</button>
      <div id="serverDots" class="server-dots"></div>
      <div class="rail-spacer"></div>
      <button id="createServerButton" class="rail-button add" type="button" title="Sunucu oluştur">＋</button>
      <button id="joinServerButton" class="rail-button join" type="button" title="Sunucuya katıl">⌁</button>
    </aside>

    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="title-wrap"><small id="sidebarMode">Gaycord</small><strong id="sidebarTitle">Arkadaşlar</strong></div>
        <span id="connectionState" class="pill">bağlanıyor</span>
      </header>
      <section id="dynamicPanel" class="panel-scroll"></section>
      <footer class="user-bar">
        <span class="avatar small" id="meAvatar">?</span>
        <div class="row-grow min-0"><strong id="meName">-</strong><small id="meUsername">-</small></div>
        <button id="settingsButton" class="icon-button" type="button" title="Ayarlar">⚙</button>
        <button id="logoutButton" class="icon-button" type="button" title="Çıkış">⎋</button>
      </footer>
    </aside>

    <section id="chatDropZone" class="chat">
      <header class="chat-header">
        <div class="chat-title-wrap min-0"><small id="chatKicker">Hazır</small><h2 id="chatTitle">Hoş geldin</h2><p id="chatSubtitle">Bir kanal veya DM seç.</p></div>
        <div class="chat-actions"><button id="mobileMenuButton" class="ghost mobile-only" type="button">☰ Menü</button><button id="notificationsButton" class="ghost" type="button" title="Bildirimler">🔔<span id="notifBadge" class="notif-badge hidden">0</span></button><button id="savedButton" class="ghost" type="button" title="Kaydedilenler">🔖</button><button id="pinsButton" class="ghost hidden" type="button" title="Sabitlenen mesajlar">📌</button><button id="mediaButton" class="ghost hidden" type="button" title="Medya galerisi">🖼</button><button id="e2eeButton" class="ghost hidden" type="button" title="Uçtan uca şifreleme">🔓 E2EE</button><button id="copyInviteButton" class="ghost hidden" type="button">Davet kodu</button><button id="mobileMembersButton" class="ghost mobile-only" type="button">Üyeler</button></div>
      </header>
      <section id="voicePanel" class="voice-panel hidden" aria-live="polite"></section>
      <section id="e2eeWarning" class="e2ee-warning hidden" aria-live="polite"></section>
      <div id="messages" class="messages" aria-live="polite"></div>
      <div id="typingLine" class="typing-line"></div>
      <form id="messageForm" class="composer">
        <span id="composerLock" class="composer-lock hidden" aria-hidden="true">🔒 Uçtan uca şifreli</span>
        <div id="replyBar" class="reply-bar hidden"><span id="replyBarText" class="reply-bar-text"></span><button id="replyCancelButton" class="reply-bar-close" type="button" title="Yanıtı iptal et">✕</button></div>
        <button id="fileButton" class="tool-button" type="button" title="Dosya/fotoğraf gönder">＋</button>
        <input id="fileInput" class="hidden" type="file" multiple accept="image/*,audio/*,video/*,.txt,.pdf,.zip">
        <button id="recordButton" class="tool-button voice" type="button" title="Sesli mesaj kaydet">🎙</button>
        <textarea id="messageInput" autocomplete="off" maxlength="2000" rows="1" placeholder="Mesaj yaz, fotoğraf yapıştır veya dosya sürükle..." disabled></textarea>
        <button id="sendButton" class="primary send" type="submit" disabled>Gönder</button>
      </form>
    </section>

    <aside id="membersPanel" class="members-panel">
      <header><small>Üyeler</small><strong id="membersTitle">-</strong></header>
      <div id="membersList" class="members-list"></div>
    </aside>
  </main>

  <dialog id="settingsModal" class="settings-modal">
    <form method="dialog" class="settings-shell">
      <header class="settings-head"><div><small>Gaycord</small><h2>Ayarlar</h2></div><button id="closeSettingsButton" class="icon-button" type="submit">✕</button></header>
      <div id="settingsContent" class="settings-content"></div>
    </form>
  </dialog>
  <div id="remoteAudio" class="remote-audio" aria-hidden="true"></div>
  <div id="toast" class="toast hidden"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js?v=7.7.0" defer></script>
  <script src="/mobile.js?v=7.7.0" defer></script>
</body>
</html>
