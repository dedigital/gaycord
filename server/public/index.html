<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5865f2">
  <title>Arkadaş Odası</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main id="auth" class="auth-shell hidden">
    <section class="auth-card">
      <div class="brand-block">
        <div class="logo">AO</div>
        <div>
          <h1>Arkadaş Odası</h1>
          <p>Arkadaşlarınla sunucularda, DM’de ve sesli mesajlarla konuş.</p>
        </div>
      </div>

      <div class="tabs" role="tablist" aria-label="Giriş seçenekleri">
        <button id="loginTab" class="tab active" type="button">Giriş</button>
        <button id="registerTab" class="tab" type="button">Kayıt</button>
      </div>

      <form id="authForm" class="stack">
        <label id="displayNameWrap" class="hidden">
          Görünen ad
          <input id="displayNameInput" autocomplete="name" placeholder="Örn. Mete">
        </label>
        <label>
          Kullanıcı adı
          <input id="usernameInput" autocomplete="username" required placeholder="ornek_kullanici">
        </label>
        <label>
          Şifre
          <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="En az 6 karakter">
        </label>
        <button id="authSubmit" class="primary" type="submit">Giriş yap</button>
      </form>
    </section>
  </main>

  <main id="app" class="app hidden">
    <aside class="rail" aria-label="Sunucular">
      <button id="homeButton" class="rail-button active" type="button" title="Arkadaşlar">🏠</button>
      <div id="serverDots" class="server-dots"></div>
      <button id="createServerButton" class="rail-button" type="button" title="Sunucu oluştur">＋</button>
      <button id="joinServerButton" class="rail-button" type="button" title="Sunucuya katıl">⌁</button>
    </aside>

    <aside class="sidebar">
      <header class="sidebar-header">
        <strong id="sidebarTitle">Arkadaşlar</strong>
        <span id="connectionState" class="pill">bağlanıyor</span>
      </header>
      <section id="dynamicPanel" class="panel-scroll"></section>
      <footer class="user-bar">
        <div>
          <strong id="meName">-</strong>
          <small id="meUsername">-</small>
        </div>
        <button id="logoutButton" type="button" title="Çıkış">⎋</button>
      </footer>
    </aside>

    <section class="chat">
      <header class="chat-header">
        <div>
          <h2 id="chatTitle">Hoş geldin</h2>
          <p id="chatSubtitle">Bir kanal veya DM seç.</p>
        </div>
        <button id="copyInviteButton" class="ghost hidden" type="button">Davet kodu</button>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>
      <div id="typingLine" class="typing-line"></div>

      <form id="messageForm" class="composer">
        <button id="recordButton" class="voice" type="button" title="Sesli mesaj kaydet">🎙️</button>
        <input id="messageInput" autocomplete="off" maxlength="2000" placeholder="Mesaj yaz..." disabled>
        <button id="sendButton" class="primary" type="submit" disabled>Gönder</button>
      </form>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js" defer></script>
</body>
</html>
