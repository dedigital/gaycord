name: Build Gaycord Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'windows-native/**'
      - '.github/workflows/build-windows.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore windows-native/Gaycord.Native.csproj

      - name: Publish Gaycord EXE
        run: dotnet publish windows-native/Gaycord.Native.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/Gaycord-win-x64

      - name: Add server.txt placeholder
        shell: pwsh
        run: |
          if (!(Test-Path publish/Gaycord-win-x64/server.txt)) {
            Copy-Item windows-native/server.txt.example publish/Gaycord-win-x64/server.txt
          }

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: Gaycord-Windows-Native
          path: publish/Gaycord-win-x64/**
